<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor | StarView</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/reproductor.css">
</head>
<body class="player-body">

<header class="topbar app-topbar netflix-topbar">
    <div class="brand">STAR<span>VIEW</span></div>

    <nav class="nav">
        <a href="home.html">Inicio</a>
        <a href="mi-lista.html">Mi Lista</a>
        <a href="seleccionar-perfil.html">Cambiar perfil</a>
    </nav>
</header>

<main class="netflix-player-page">

    <section class="hero-player" id="heroPlayer">
        <div class="hero-overlay"></div>

        <div class="hero-content">
            <p class="hero-eyebrow">REPRODUCIENDO AHORA</p>
            <h1 id="tituloContenido">Título</h1>

            <div class="hero-meta">
                <span id="tipoContenido">Tipo</span>
                <span>•</span>
                <span id="generoContenido">Género</span>
            </div>

            <p id="descripcionContenido" class="hero-description">
                Descripción del contenido.
            </p>

            <div class="hero-buttons">
                <button class="btn btn-primary" onclick="reproducirVideo()">▶ Reproducir</button>
                <button class="btn btn-secondary" onclick="marcarVisto()">✔ Marcar como visto</button>
                <a href="home.html" class="btn btn-dark">← Volver al catálogo</a>
            </div>
        </div>
    </section>

    <section class="video-player-section">
        <div class="video-card" id="videoContenedor">
            <video id="videoPlayer" poster="img/backdrop.jpg" preload="metadata" playsinline>
                <source src="videos/demo.mp4" type="video/mp4">
                Tu navegador no soporta video.
            </video>

            <div id="mensajeProgresoVideo" class="player-progress-note">
                Cargando progreso del video...
            </div>

            <div class="controles-personalizados" id="controlesVideo">
                <div class="controles-progreso">
                    <input type="range" id="barraProgreso" value="0" min="0" max="100" step="0.1">
                </div>

                <div class="controles-botones">
                    <div class="controles-izquierda">
                        <button id="btnPlayPause" class="btn-control">▶ Play</button>
                        <button id="btnRetroceder" class="btn-control">⏪ 10s</button>
                        <button id="btnAdelantar" class="btn-control">30s ⏩</button>

                        <div class="control-volumen">
                            <span>🔊</span>
                            <input type="range" id="barraVolumen" min="0" max="1" step="0.1" value="1">
                        </div>
                    </div>

                    <div class="controles-derecha">
                        <button id="btnPantallaCompleta" class="btn-control">⛶ Pantalla completa</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="recomendaciones-netflix">
        <h2>Porque estás viendo esto, te recomendamos:</h2>
        <div class="slider-peliculas" id="contenedorRecomendaciones"></div>
    </section>

</main>

<script src="js/reproductor.js"></script>
</body>
</html>
