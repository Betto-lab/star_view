<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor | StarView</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="player-body">

<header class="topbar app-topbar">
    <div class="brand">STAR<span>VIEW</span></div>

    <nav class="nav">
        <a href="home.html">Inicio</a>
        <a href="mi-lista.html">Mi Lista</a>
        <a href="seleccionar-perfil.html">Cambiar perfil</a>
    </nav>
</header>

<main class="player-layout">
    <section class="player-info">
        <img id="imagenContenido" class="player-poster" alt="Poster del contenido">

        <div>
            <p class="eyebrow">Reproduciendo ahora</p>
            <h1 id="tituloContenido"></h1>
            <p id="tipoContenido" class="meta-line"></p>
            <p id="generoContenido" class="meta-line"></p>
            <p id="descripcionContenido" class="player-description"></p>

            <div class="player-actions">
                <button class="btn btn-primary" onclick="marcarVisto()">Marcar como visto</button>
                <a href="home.html" class="btn btn-secondary">Volver al catálogo</a>
            </div>
        </div>
    </section>

    <section class="video-shell" id="videoContenedor">
        <video id="videoPlayer" poster="img/backdrop.jpg">
            <source src="videos/demo.mp4" type="video/mp4">
            Tu navegador no soporta video.
        </video>

        <div class="controles-personalizados" id="controlesVideo">
            <div class="controles-progreso">
                <input type="range" id="barraProgreso" value="0" min="0" step="0.1">
            </div>
            
            <div class="controles-botones">
                <div class="controles-izquierda">
                    <button id="btnPlayPause" class="btn-control">▶ Play</button>
                    <button id="btnRetroceder" class="btn-control">⏪ 10s</button>
                    <button id="btnAdelantar" class="btn-control">30s ⏩</button>
                    
                    <div class="control-volumen">
                        <span>🔊</span>
                        <input type="range" id="barraVolumen" min="0" max="1" step="0.1" value="1">
                    </div>
                </div>
                
                <div class="controles-derecha">
                    <button id="btnPantallaCompleta" class="btn-control">🔲 Pantalla Completa</button>
                </div>
            </div>
        </div>
    </section>

    <section class="recomendaciones-wrapper" style="margin-top: 40px;">
        <h3 style="color: white; margin-bottom: 15px;">Porque estás viendo esto, te recomendamos:</h3>
        <div class="slider-peliculas" id="contenedorRecomendaciones" style="display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px;">
            </div>
    </section>
</main>

<script src="js/reproductor.js"></script>
</body>
</html>
