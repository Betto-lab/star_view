<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarView</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-body">

<header class="topbar app-topbar">
    <a href="home.html" class="brand" style="text-decoration: none;">STAR<span>VIEW</span></a>

    <nav class="nav">
        <!-- Opciones principales -->
        <a href="home.html">Inicio</a>
        <a href="mi-lista.html" class="activo">Mi Lista</a>
        <div class="search-container">
                <button class="btn-search-icon" style="background: transparent; border: none; color: white; font-size: 20px; cursor: pointer;">🔍</button>
            </div>
        <!-- Menú Desplegable del Perfil -->
        <div class="nav-perfil">
            <div class="nav-perfil-trigger">
                <img src="img/Red.jpg" id="navAvatar" class="nav-perfil-avatar" alt="Perfil">
                <span class="nav-perfil-arrow">▼</span>
            </div>
            
            <div class="dropdown-menu">
                <div style="padding: 10px 20px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 5px;" id="navNombrePerfil">Cargando...</div>
                
                <button onclick="abrirEdicionPerfilActual()">✏️ Editar perfil</button>
                <a href="seleccionar-perfil.html">👥 Cambiar de perfil</a>
                <div class="dropdown-divider"></div>
                <a href="planes.html">💳 Planes</a>
                <a href="facturacion.html">📄 Facturación</a>
                <a href="suscripcion.html">⭐ Suscripción</a>
                <div class="dropdown-divider"></div>
                <button onclick="cerrarSesion()">🚪 Cerrar sesión</button>
                <button onclick="eliminarPerfilActual()" style="color: #ffb4b8; margin-top: 5px;">🗑️ Eliminar perfil</button>
            </div>
        </div>
    </nav>
</header>

<main class="facturacion-section page-top">
    <p class="eyebrow">Pagos</p>
    <h1>Historial de facturación</h1>
    <p class="section-subtitle">Consulta tus pagos realizados y descarga tus recibos.</p>

    <div class="tabla-contenedor">
        <table class="tabla-facturacion">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Plan</th>
                    <th>Monto</th>
                    <th>Método</th>
                    <th>Estado</th>
                    <th>Recibo</th>
                </tr>
            </thead>

            <tbody id="tablaPagos"></tbody>
        </table>
    </div>
</main>

<script src="js/facturacion.js"></script>
<div id="modalEditarPerfil" class="modal-overlay">
    <section class="modal-card">
        <h2>Editar perfil</h2>
        
        <label>Nombre</label>
        <input type="text" id="editNombrePerfil">
        
        <label>Color de Avatar</label>
        <select id="editAvatarPerfil" style="margin-bottom: 15px; width: 100%; padding: 12px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; outline: none;">
            <option value="Red.jpg" style="color: black;">Rojo</option>
            <option value="Blue.jpg" style="color: black;">Azul</option>
            <option value="Green.jpg" style="color: black;">Verde</option>
            <option value="Yellow.jpg" style="color: black;">Amarillo</option>
            <option value="Pink.jpg" style="color: black;">Rosa</option>
        </select>

        <label class="checkbox-line" style="margin-bottom: 20px;">
            <input type="checkbox" id="editInfantilPerfil"> Perfil infantil
        </label>

        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="document.getElementById('modalEditarPerfil').classList.remove('show')">Cancelar</button>
            <button class="btn btn-primary" onclick="guardarEdicionPerfilActual()">Guardar Cambios</button>
        </div>
    </section>
</div>

<script>
    const NAV_API_BASE = window.location.origin;

    function cerrarSesionNav() {
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = "index.html";
    }

    async function cargarDatosTopbar() {
        const usuario_id = localStorage.getItem("usuario_id") || sessionStorage.getItem("usuario_id");
        const perfil_id = localStorage.getItem("perfil_id") || sessionStorage.getItem("perfil_id");
        
        if (!usuario_id || !perfil_id) return;

        try {
            const res = await fetch(`${NAV_API_BASE}/perfiles/${usuario_id}`);
            const perfiles = await res.json();
            const actual = perfiles.find(p => String(p.id) === String(perfil_id));
            
            if (actual) {
                const img = actual.avatar.includes('.') ? actual.avatar : actual.avatar + '.jpg';
                document.getElementById("navAvatar").src = `img/${img}`;
                document.getElementById("navNombrePerfil").innerText = actual.nombre;
                window.perfilNavData = actual; 
            }
        } catch (e) {
            console.error("Error al cargar menú superior:", e);
        }
    }

    function abrirEdicionPerfilActual() {
        if (!window.perfilNavData) {
            alert("Los datos del perfil están cargando, por favor intenta de nuevo en un segundo.");
            return;
        }
        
        document.getElementById("editNombrePerfil").value = window.perfilNavData.nombre;
        const av = window.perfilNavData.avatar;
        document.getElementById("editAvatarPerfil").value = av.includes('.') ? av : av + '.jpg';
        document.getElementById("editInfantilPerfil").checked = (Number(window.perfilNavData.infantil) === 1);
        
        document.getElementById("modalEditarPerfil").classList.add("show");
    }

    async function guardarEdicionPerfilActual() {
        const perfil_id = localStorage.getItem("perfil_id") || sessionStorage.getItem("perfil_id");
        const nombre = document.getElementById("editNombrePerfil").value.trim();
        const avatar = document.getElementById("editAvatarPerfil").value;
        const infantil = document.getElementById("editInfantilPerfil").checked;

        if (!nombre) return alert("El nombre es obligatorio");

        try {
            const res = await fetch(`${NAV_API_BASE}/perfiles/${perfil_id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nombre, avatar, infantil })
            });
            const datos = await res.json();
            
            if (datos.ok) {
                if (localStorage.getItem("perfil_nombre")) {
                    localStorage.setItem("perfil_nombre", nombre);
                    localStorage.setItem("perfil_infantil", infantil ? "1" : "0");
                } else {
                    sessionStorage.setItem("perfil_nombre", nombre);
                    sessionStorage.setItem("perfil_infantil", infantil ? "1" : "0");
                }
                window.location.reload(); 
            } else {
                alert(datos.mensaje);
            }
        } catch(e) { alert("Error de conexión"); }
    }

    async function eliminarPerfilActual() {
        if(!confirm("¿Estás 100% seguro de eliminar ESTE perfil?\nPerderás tu Historial y Mi Lista para siempre.")) return;
        
        const perfil_id = localStorage.getItem("perfil_id") || sessionStorage.getItem("perfil_id");
        try {
            const res = await fetch(`${NAV_API_BASE}/perfiles/${perfil_id}`, { method: "DELETE" });
            const datos = await res.json();
            
            if (datos.ok) {
                localStorage.removeItem("perfil_id");
                localStorage.removeItem("perfil_nombre");
                sessionStorage.removeItem("perfil_id");
                sessionStorage.removeItem("perfil_nombre");
                window.location.href = "seleccionar-perfil.html";
            } else {
                alert(datos.mensaje);
            }
        } catch(e) { alert("Error al eliminar"); }
    }

    // Inicializar funciones de la barra
    document.addEventListener("DOMContentLoaded", () => {
        cargarDatosTopbar();
    });
</script>
<script src="js/buscador.js"></script>
<div id="searchOverlay" class="search-overlay oculto">
    <div class="search-overlay-header">
        <button id="closeSearchOverlay">✖</button>
        <input type="text" id="searchInputOverlay" placeholder="Realiza tu busqueda...">
    </div>
    <div id="searchResults" class="catalogo"></div> 
</div>
</body>
</html>
