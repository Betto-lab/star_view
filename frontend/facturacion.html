<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturación | StarView</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-body">

<header class="topbar app-topbar">
    <a href="home.html" class="brand" style="text-decoration: none;">STAR<span>VIEW</span></a>

    <nav class="nav">
        <a href="home.html">Inicio</a>
        <a href="mi-lista.html">Mi Lista</a>

        <div class="nav-perfil">
            <div class="nav-perfil-trigger">
                <img src="img/Red.jpg" id="navAvatar" class="nav-perfil-avatar" alt="Perfil">
                <span class="nav-perfil-arrow">▼</span>
            </div>
            <div class="dropdown-menu">
                <div style="padding: 10px 20px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 5px;" id="navNombrePerfil">Cargando...</div>
                <button onclick="abrirEdicionPerfilActual()">✏️ Editar perfil</button>
                <a href="seleccionar-perfil.html">👥 Cambiar de perfil</a>
                <div class="dropdown-divider"></div>
                <a href="planes.html">💳 Planes</a>
                <a href="facturacion.html">📄 Facturación</a>
                <a href="suscripcion.html">⭐ Suscripción</a>
                <div class="dropdown-divider"></div>
                <button onclick="cerrarSesion()">🚪 Cerrar sesión</button>
                <button onclick="eliminarPerfilActual()" style="color: #ffb4b8; margin-top: 5px;">🗑️ Eliminar perfil</button>
            </div>
        </div>
    </nav>
</header>

<main class="facturacion-section page-top">
    <p class="eyebrow">Pagos</p>
    <h1>Historial de facturación</h1>
    <p class="section-subtitle">Consulta tus pagos realizados y descarga tus recibos.</p>

    <div class="tabla-contenedor">
        <table class="tabla-facturacion">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Plan</th>
                    <th>Monto</th>
                    <th>Método</th>
                    <th>Estado</th>
                    <th>Recibo</th>
                </tr>
            </thead>

            <tbody id="tablaPagos"></tbody>
        </table>
    </div>
</main>

<script src="js/facturacion.js"></script>
<script>
    // 1. VARIABLE DINÁMICA (No falla en producción)
    const API_BASE = window.location.origin;

    function cerrarSesion() {
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = "index.html";
    }

    // ==========================================
    // MENÚ DESPLEGABLE Y ADMINISTRACIÓN DE PERFIL
    // ==========================================
    
    // Función separada (Igual que en mi-lista.js)
    async function cargarDatosTopbar() {
        const usuario_id = localStorage.getItem("usuario_id") || sessionStorage.getItem("usuario_id");
        const perfil_id = localStorage.getItem("perfil_id") || sessionStorage.getItem("perfil_id");
        
        if (!usuario_id || !perfil_id) return;

        try {
            const res = await fetch(`${API_BASE}/perfiles/${usuario_id}`);
            const perfiles = await res.json();
            const actual = perfiles.find(p => String(p.id) === String(perfil_id));
            
            if (actual) {
                const img = actual.avatar.includes('.') ? actual.avatar : actual.avatar + '.jpg';
                document.getElementById("navAvatar").src = `img/${img}`;
                document.getElementById("navNombrePerfil").innerText = actual.nombre;
                
                // Guardamos en memoria global para el botón Editar
                window.perfilActualData = actual; 
            }
        } catch (e) {
            console.log("Error al cargar topbar:", e);
        }
    }

    // Funciones globales (Igual que en mi-lista.js)
    function abrirEdicionPerfilActual() {
        if (!window.perfilActualData) return;
        
        document.getElementById("editNombrePerfil").value = window.perfilActualData.nombre;
        
        const av = window.perfilActualData.avatar;
        document.getElementById("editAvatarPerfil").value = av.includes('.') ? av : av + '.jpg';
        document.getElementById("editInfantilPerfil").checked = (Number(window.perfilActualData.infantil) === 1);
        
        document.getElementById("modalEditarPerfil").classList.add("show");
    }

    async function guardarEdicionPerfilActual() {
        const perfil_id = localStorage.getItem("perfil_id") || sessionStorage.getItem("perfil_id");
        const nombre = document.getElementById("editNombrePerfil").value.trim();
        const avatar = document.getElementById("editAvatarPerfil").value;
        const infantil = document.getElementById("editInfantilPerfil").checked;

        if (!nombre) return alert("El nombre es obligatorio");

        try {
            const res = await fetch(`${API_BASE}/perfiles/${perfil_id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nombre, avatar, infantil })
            });
            const datos = await res.json();
            
            if (datos.ok) {
                if (localStorage.getItem("perfil_nombre")) {
                    localStorage.setItem("perfil_nombre", nombre);
                    localStorage.setItem("perfil_infantil", infantil ? "1" : "0");
                } else {
                    sessionStorage.setItem("perfil_nombre", nombre);
                    sessionStorage.setItem("perfil_infantil", infantil ? "1" : "0");
                }
                window.location.reload(); 
            } else {
                alert(datos.mensaje);
            }
        } catch(e) { alert("Error de conexión"); }
    }

    async function eliminarPerfilActual() {
        if(!confirm("¿Estás 100% seguro de eliminar ESTE perfil?")) return;
        
        const perfil_id = localStorage.getItem("perfil_id") || sessionStorage.getItem("perfil_id");
        try {
            const res = await fetch(`${API_BASE}/perfiles/${perfil_id}`, { method: "DELETE" });
            const datos = await res.json();
            
            if (datos.ok) {
                localStorage.removeItem("perfil_id");
                localStorage.removeItem("perfil_nombre");
                sessionStorage.removeItem("perfil_id");
                sessionStorage.removeItem("perfil_nombre");
                window.location.href = "seleccionar-perfil.html";
            } else {
                alert(datos.mensaje);
            }
        } catch(e) { alert("Error al eliminar"); }
    }

    // Inicializador (Igual que en mi-lista.js)
    document.addEventListener("DOMContentLoaded", () => {
        cargarDatosTopbar();
    });
</script>
</body>
</html>
