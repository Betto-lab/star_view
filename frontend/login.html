<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | StarView</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

<header class="topbar">
    <a href="index.html" class="brand">STAR<span>VIEW</span></a>

    <nav class="nav">
        <a href="index.html">Inicio</a>
        <a href="registro.html" class="nav-pill">Registrarse</a>
    </nav>
</header>

<main class="auth-container">
    <section class="auth-card">
        <p class="eyebrow">Bienvenido nuevamente</p>
        <h1>Iniciar sesión</h1>
        <p class="auth-subtitle">Ingresa con tu cuenta para elegir perfil y continuar viendo.</p>

        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" placeholder="ejemplo@correo.com" autocomplete="email">

        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password">

        <input type="checkbox" id="mantenerSesion" checked hidden>

        <div class="password-tools" style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 15px;">
            <button type="button" class="link-button" onclick="abrirRecuperacion()" style="margin: 0;">
                ¿Olvidaste tu contraseña?
            </button>
        </div>

        <button class="btn btn-primary btn-full" onclick="iniciarSesion()">Ingresar</button>

        <p id="mensaje" class="mensaje"></p>

        <p class="auth-link">
            ¿Aún no tienes cuenta?
            <a href="registro.html">Crear cuenta nueva</a>
        </p>
    </section>
</main>

<div id="modalRecuperacion" class="modal-overlay">
    <section class="modal-card">
        <p class="eyebrow">Recuperación de cuenta</p>
        <h2>Restablecer contraseña</h2>
        <p style="margin-bottom: 15px;">Ingresa tu correo para recibir un código de seguridad.</p>

        <label for="correoRecuperar">Correo electrónico</label>
        <input type="email" id="correoRecuperar" placeholder="correo@ejemplo.com" autocomplete="email">

        <button id="btnPedirCodigo" class="btn btn-secondary btn-full" style="margin-bottom: 20px;" onclick="pedirCodigoCuenta()">
            Enviar código al correo
        </button>

        <label for="codigoCuenta">Código recibido</label>
        <input type="text" id="codigoCuenta" placeholder="Ejemplo: 123456" maxlength="6">

        <label for="nuevaPassword">Nueva contraseña</label>
        <input type="password" id="nuevaPassword" placeholder="Mínimo 6 caracteres" autocomplete="new-password">

        <p id="mensajeRecuperacion" class="mensaje"></p>

        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="cerrarRecuperacion()">Cancelar</button>
            <button class="btn btn-primary" onclick="restablecerPasswordCuenta()">Actualizar contraseña</button>
        </div>
    </section>
</div>

<script src="js/login.js"></script>
</body>
</html>
