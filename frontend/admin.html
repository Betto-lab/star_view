<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - StarView</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Arial', sans-serif;
            background-color: #0b0f19; color: #ffffff;
        }
        .admin-header {
            background-color: #151a23; padding: 20px 40px;
            border-bottom: 1px solid #1f2937; display: flex;
            justify-content: space-between; align-items: center;
        }
        .admin-header h1 {
            color: #e50914; margin: 0; font-size: 24px; letter-spacing: 2px;
        }
        .container {
            padding: 40px; max-width: 1200px; margin: 0 auto;
        }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;
        }
        .stat-card {
            background: linear-gradient(145deg, #1f2937, #151a23);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 30px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .stat-card h3 {
            margin: 0 0 10px 0; color: #94a3b8; font-size: 16px; text-transform: uppercase;
        }
        .stat-card .value {
            font-size: 40px; font-weight: bold; margin: 0; color: #ffffff;
        }
        .stat-card.ingresos .value { color: #4ade80; } /* Verde para dinero */
        .btn-volver {
            background: transparent; color: #cbd5e1; border: 1px solid #cbd5e1;
            padding: 8px 16px; border-radius: 6px; cursor: pointer; text-decoration: none;
        }
        .btn-volver:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <header class="admin-header">
        <h1>STARVIEW <span style="color: #fff; font-size: 18px;">ADMIN</span></h1>
        <a href="home.html" class="btn-volver">Volver al sitio</a>
    </header>

    <div class="container">
        <h2 style="margin-bottom: 30px;">Resumen del Negocio</h2>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>👥 Usuarios Registrados</h3>
                <p class="value" id="valUsuarios">Cargando...</p>
            </div>

            <div class="stat-card">
                <h3>⭐ Suscripciones Activas</h3>
                <p class="value" id="valSuscripciones">Cargando...</p>
            </div>

            <div class="stat-card ingresos">
                <h3>💰 Ingresos Totales</h3>
                <p class="value" id="valIngresos">S/ 0.00</p>
            </div>
        </div>
    </div>

    <script>
        async function cargarMeticas() {
            // Sacamos quién es el que está intentando entrar
            const usuario_id = localStorage.getItem("usuario_id") || sessionStorage.getItem("usuario_id");

            // Si ni siquiera ha iniciado sesión, lo botamos al login
            if (!usuario_id) {
                window.location.href = "login.html";
                return;
            }

            try {
                // Le mandamos el ID al servidor para que decida si le abre la puerta
                const respuesta = await fetch(`${window.location.origin}/api/admin/stats/${usuario_id}`);
                const datos = await respuesta.json();

                if (datos.ok) {
                    // Si tiene permiso, pintamos los datos
                    document.getElementById("valUsuarios").innerText = datos.usuarios;
                    document.getElementById("valSuscripciones").innerText = datos.suscripciones_activas;
                    document.getElementById("valIngresos").innerText = `S/ ${datos.ingresos}`;
                } else {
                    // Si el servidor lo rebota (porque no es el admin), lo botamos al inicio
                    alert("⛔ ALERTA DE SEGURIDAD: " + datos.mensaje);
                    window.location.replace("home.html");
                }
            } catch (error) {
                console.error("Error de conexión:", error);
            }
        }
        // Ejecutar al abrir la página
        document.addEventListener("DOMContentLoaded", cargarMeticas);
    </script>
</body>
</html>
